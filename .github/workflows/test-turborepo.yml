name: Test TurboRepo

on:
  pull_request:

jobs:
  check-need:
    name: Check if Cypress tests are needed
    runs-on: ubuntu-latest
    outputs:
      needs_tests: ${{ steps.check.outputs.needs_tests }}

    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth 0 and filter blob:none give full commit history without
          # downloading file contents, which is all turbo query affected needs
          fetch-depth: 0
          filter: blob:none

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Check 
        id: check
        env:
            TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "needs_tests=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo TURBO_SCM_BASE=${TURBO_SCM_BASE}

          # The "npx turbo" below will successfully terminate if tests don't need to be executed
          # and will fail otherwise.
          if npx --yes turbo@2.9.6 query affected --tasks test:cypress:components test:cypress:ui --exit-code; then
            echo "needs_tests=false" >> $GITHUB_OUTPUT
          else
            echo "needs_tests=true" >> $GITHUB_OUTPUT
          fi

