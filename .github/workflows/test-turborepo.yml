name: Test TurboRepo

on:
  pull_request:

jobs:
  check-need:
    name: Check if Cypress tests are needed
    runs-on: ubuntu-latest
    outputs:
      needs_tests: ${{ steps.check.outputs.needs_tests }}

    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth 0 and filter blob:none give full commit history without
          # downloading file contents, which is all turbo query affected needs
          fetch-depth: 0
          filter: blob:none

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Git --version
        run: git --version

      - name: Check without TURBO_SCM_BASE
        run: |
          if npx --yes turbo@2.9.6 query affected --tasks build --exit-code; then
            echo "Nothing to do"
          else
            echo "We have some work to do"
          fi

      - name: Check with TURBO_SCM_BASE
        env:
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          if npx --yes turbo@2.9.6 query affected --tasks build --exit-code; then
            echo "Nothing to do"
          else
            echo "We have some work to do"
          fi

      - name: Creating branch "main"
        run: git branch main origin/main

      - name: Check without TURBO_SCM_BASE
        run: |
          if npx --yes turbo@2.9.6 query affected --tasks build --exit-code; then
            echo "Nothing to do"
          else
            echo "We have some work to do"
          fi

      - name: Check with TURBO_SCM_BASE
        env:
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          if npx --yes turbo@2.9.6 query affected --tasks build --exit-code; then
            echo "Nothing to do"
          else
            echo "We have some work to do"
          fi
